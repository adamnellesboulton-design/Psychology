name: Deploy to GitHub Pages

# Publishes docs/ (the self-contained browser app) to GitHub Pages on every
# push. The site runs entirely client-side, so there is no build step.
#
# One-time setup in the repository: Settings > Pages > Build and deployment >
# Source: "GitHub Actions". After that this runs automatically. Pages usually
# deploys from the default branch, so merge this branch into the default branch
# (or add it below) to publish.

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload the docs folder as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
